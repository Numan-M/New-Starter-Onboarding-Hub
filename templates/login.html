<!DOCTYPE html>
<html>
<head>
    <title>Onboarding Hub – Sign In</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border-radius: 12px;
            border: 0.5px solid #e0e0e0;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
        }
        .login-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .login-logo { height: 30px; }
        .login-title {
            font-size: 18px;
            font-weight: bold;
            color: #2a4386;
        }
        .form-group { margin-bottom: 1.25rem; }
        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 14px;
            color: #2a4386;
            outline: none;
        }
        input:focus { border-color: #2a4386; }
        .login-btn {
            width: 100%;
            background: #2a4386;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .login-btn:hover { opacity: 0.9; }
        .error-box {
            background: #fff0f0;
            border: 1px solid #f5c1c1;
            color: #a32d2d;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            margin-bottom: 1rem;
        }
        .divider {
            border: none;
            border-top: 0.5px solid #e0e0e0;
            margin: 1.5rem 0 1rem;
        }
        .footer-note {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin: 0;
        }
    </style>
</head>
