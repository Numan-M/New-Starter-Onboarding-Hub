apiVersion: apps/v1
kind: Deployment
metadata:
  name: nsoh-dev
  namespace: nsoh-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nsoh-dev
  template:
    metadata:
      labels:
        app: nsoh-dev
    spec:
      containers:
      - name: nsoh
        image: numanepa.azurecr.io/epa/nsoh:1.0
        ports:
        - containerPort: 80